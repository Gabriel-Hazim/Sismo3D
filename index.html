<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Sísmico - Torre de Parque Central</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="bg-gray-900 text-white overflow-hidden select-none w-screen h-screen real-vvh">

    <div class="absolute top-0 left-0 w-full p-4 z-10 pointer-events-none flex flex-col justify-between h-full">
        
        <div class="bg-gray-800 bg-opacity-80 p-4 rounded-xl border border-gray-700 backdrop-filter backdrop-blur-md pointer-events-auto shadow-2xl max-w-sm">
            <h1 class="text-xl font-black tracking-wider text-yellow-500 uppercase">Simulador Sísmico 3D</h1>
            <p class="text-xs text-gray-400 font-semibold mb-2">Estructura: Torre Este (Parque Central)</p>
            <hr class="border-gray-700 my-2">
            
            <div class="grid grid-cols-2 gap-2 text-sm font-mono">
                <div>Escala Richter:</div>
                <div id="richter-val" class="text-right text-red-400 font-bold">1.0 M_w</div>
                
                <div>Frecuencia:</div>
                <div id="freq-val" class="text-right text-blue-400">0.50 Hz</div>
                
                <div>Desplazamiento Máx:</div>
                <div id="disp-val" class="text-right text-orange-400">0.00 m</div>
                
                <div>Estado Estructural:</div>
                <div id="status-val" class="text-right text-green-400 font-bold">ESTABLE</div>
            </div>
        </div>

        <div class="bg-gray-800 bg-opacity-90 p-5 rounded-2xl border border-gray-700 backdrop-filter backdrop-blur-md pointer-events-auto shadow-2xl w-full max-w-md mx-auto mb-2">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Magnitud del Terremoto</span>
                <span id="richter-slider-val" class="bg-red-600 px-3 py-0.5 rounded-full font-black text-sm font-mono">1.0</span>
            </div>
            
            <input type="range" id="richter-slider" min="1.0" max="10.0" step="0.1" value="1.0" 
                   class="w-full h-3 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-red-500 mb-4">
            
            <div class="flex gap-2">
                <button id="btn-trigger" class="flex-1 bg-yellow-600 hover:bg-yellow-500 active:bg-yellow-700 text-gray-900 font-black py-3 px-4 rounded-xl transition duration-150 uppercase tracking-wider text-xs">
                    Iniciar Onda Símica
                </button>
                <button id="btn-reset" class="bg-gray-700 hover:bg-gray-600 active:bg-gray-800 px-5 rounded-xl font-bold transition duration-150 text-xs uppercase tracking-wider">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-full absolute top-0 left-0 z-0"></div>

    <script>
        // --- CONFIGURACIÓN ESTRUCTURAL Y FÍSICA ---
        const TOWER_HEIGHT = 22.5; // Escala 1:10 aproximada para visualización
        const NUM_SEGMENTS = 15;   // Segmentos de la torre para simular la flexión armónica
        let earthquakeActive = false;
        let earthquakeTime = 0;
        let richterMagnitude = 1.0;
        
        // Configuración de la Escena
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a); // Fondo Slate-900
        scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimización de rendimiento móvil
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Controles de cámara táctiles
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Evita pasar por debajo del suelo
        controls.minDistance = 10;
        controls.maxDistance = 60;

        // --- ILUMINACIÓN ---
        const ambientLight = new THREE.AmbientLight(0x334155, 1.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(30, 40, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- CREACIÓN DEL ENTORNO (Caracas / Suelo) ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(100, 50, 0x475569, 0x334155);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- MODELADO DE LA TORRE DE PARQUE CENTRAL (Modular / Segmentada) ---
        // Contenedor maestro de la estructura
        const structuralSystem = new THREE.Group();
        scene.add(structuralSystem);

        const towerSegments = [];
        const segmentHeight = TOWER_HEIGHT / NUM_SEGMENTS;

        // Geometrías base para simular la silueta arquitectónica real de Parque Central (Prisma con pantallas estructurales)
        const coreGeo = new THREE.BoxGeometry(4, segmentHeight, 4);
        const coreMat = new THREE.MeshStandardMaterial({ 
            color: 0x64748b, 
            roughness: 0.5, 
            metalness: 0.2,
            transparent: true,
            opacity: 0.95 
        });

        // Macro-columnas laterales características de Parque Central
        const pillarGeo = new THREE.BoxGeometry(0.5, segmentHeight, 4.2);
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.4 });

        for (let i = 0; i < NUM_SEGMENTS; i++) {
            const segmentGroup = new THREE.Group();
            // Posicionamiento apilado
            segmentGroup.position.y = (i * segmentHeight) + (segmentHeight / 2);
            
            // Núcleo del piso
            const core = new THREE.Mesh(coreGeo, coreMat);
            core.castShadow = true;
            core.receiveShadow = true;
            segmentGroup.add(core);

            // Columnas estructurales externas (Izquierda y Derecha)
            const leftPillar = new THREE.Mesh(pillarGeo, pillarMat);
            leftPillar.position.x = 2.1;
            leftPillar.castShadow = true;
            segmentGroup.add(leftPillar);

            const rightPillar = new THREE.Mesh(pillarGeo, pillarMat);
            rightPillar.position.x = -2.1;
            rightPillar.castShadow = true;
            segmentGroup.add(rightPillar);

            // Guardar datos iniciales de posición para cálculos cinemáticos
            structuralSystem.add(segmentGroup);
            towerSegments.push({
                mesh: segmentGroup,
                initialY: segmentGroup.position.y,
                initialX: segmentGroup.position.x,
                initialZ: segmentGroup.position.z
            });
        }

        // --- MOTOR DE FÍSICAS SÍSMICAS ANALÍTICAS ---
        function updateSeismicPhysics(deltaTime) {
            if (!earthquakeActive && earthquakeTime <= 0) {
                // Amortiguación de retorno al estado de reposo (Damping)
                towerSegments.forEach((seg, idx) => {
                    seg.mesh.position.x += (seg.initialX - seg.mesh.position.x) * 0.1;
                    seg.mesh.position.z += (seg.initialZ - seg.mesh.position.z) * 0.1;
                    seg.mesh.rotation.z += (0 - seg.mesh.rotation.z) * 0.1;
                });
                gridHelper.position.x *= 0.9;
                gridHelper.position.z *= 0.9;
                return;
            }

            if (earthquakeActive) {
                earthquakeTime += deltaTime;
            }

            // Cálculo analítico basado en la magnitud de Richter (Escala Exponencial)
            // Cada grado Richter multiplica la energía liberada por ~32, mapeamos la amplitud visual aquí:
            const amplitudeFactor = Math.pow(1.75, richterMagnitude) * 0.02;
            
            // Modulación de la frecuencia fundamental del suelo según la magnitud (Sismos grandes tienen ondas más largas)
            const baseFrequency = Math.max(0.5, 5.0 - (richterMagnitude * 0.4));
            
            // Movimiento armónico compuesto del suelo (Ondas P y S combinadas)
            const groundX = Math.sin(earthquakeTime * baseFrequency * Math.PI * 2) * amplitudeFactor;
            const groundZ = Math.cos(earthquakeTime * baseFrequency * 1.3 * Math.PI * 2) * (amplitudeFactor * 0.5);

            // Mover el suelo (Simulación visual del epicentro)
            gridHelper.position.x = groundX;
            gridHelper.position.z = groundZ;

            // Desplazamiento de los segmentos de la torre usando una función de transferencia de viga en voladizo
            // Desplazamiento máximo en la cúspide (Efecto Látigo / Resonancia)
            let maxCurrentDisp = 0;

            towerSegments.forEach((seg, idx) => {
                const heightRatio = seg.initialY / TOWER_HEIGHT;
                
                // Desfase de fase según la altura (Propagación de la onda a través de la estructura de concreto)
                const phaseLag = heightRatio * Math.PI * 1.2;
                
                // Amplificación dinámica por altura (función cuadrática no lineal)
                const dynamicAmplification = Math.pow(heightRatio, 2.2) * (richterMagnitude * 0.65);
                
                // Cálculo de la deformación final del segmento
                const targetX = groundX + Math.sin(earthquakeTime * baseFrequency * Math.PI * 2 - phaseLag) * amplitudeFactor * dynamicAmplification;
                const targetZ = groundZ + Math.cos(earthquakeTime * baseFrequency * 1.3 * Math.PI * 2 - phaseLag) * amplitudeFactor * dynamicAmplification * 0.5;

                seg.mesh.position.x = targetX;
                seg.mesh.position.z = targetZ;

                // Rotación/Inclinación inducida por el esfuerzo de corte cortante
                seg.mesh.rotation.z = (targetX - groundX) * 0.04;

                // Monitorear el desplazamiento del tope para las métricas de UI
                if (idx === NUM_SEGMENTS - 1) {
                    maxCurrentDisp = Math.sqrt(targetX * targetX + targetZ * targetZ) * 4.4; // Multiplicador de escala real (m)
                }
            });

            // Actualizar Interfaz Gráfica de Usuario en tiempo real
            document.getElementById('disp-val').innerText = `${maxCurrentDisp.toFixed(2)} m`;
            document.getElementById('freq-val').innerText = `${baseFrequency.toFixed(2)} Hz`;
            
            updateStructuralStatus(maxCurrentDisp);
        }

        // --- SISTEMA DE EVALUACIÓN DE DAÑOS EN BASE A REGLAS ---
        function updateStructuralStatus(displacement) {
            const statusEl = document.getElementById('status-val');
            
            if (richterMagnitude < 4.0) {
                statusEl.innerText = "ESTABLE";
                statusEl.className = "text-right text-green-400 font-bold";
                coreMat.color.setHex(0x64748b);
            } else if (richterMagnitude >= 4.0 && richterMagnitude < 6.5) {
                statusEl.innerText = "VIBRACIÓN LIGERA";
                statusEl.className = "text-right text-yellow-400 font-bold";
                coreMat.color.setHex(0xb45309);
            } else if (richterMagnitude >= 6.5 && richterMagnitude < 8.0) {
                statusEl.innerText = "DAÑO EN FACHADA";
                statusEl.className = "text-right text-orange-500 font-bold";
                coreMat.color.setHex(0xd97706);
            } else if (richterMagnitude >= 8.0 && richterMagnitude < 9.5) {
                statusEl.innerText = "FALLA ESTRUCTURAL";
                statusEl.className = "text-right text-red-500 font-black animate-pulse";
                coreMat.color.setHex(0xdc2626);
            } else {
                statusEl.innerText = "COLAPSO CRÍTICO";
                statusEl.className = "text-right text-red-700 font-black animate-ping";
                coreMat.color.setHex(0x7f1d1d);
            }
        }

        // --- CAPTURA DE EVENTOS E INTERFAZ (UI) ---
        const slider = document.getElementById('richter-slider');
        const sliderVal = document.getElementById('richter-slider-val');
        const richterVal = document.getElementById('richter-val');
        const btnTrigger = document.getElementById('btn-trigger');
        const btnReset = document.getElementById('btn-reset');

        slider.addEventListener('input', (e) => {
            richterMagnitude = parseFloat(e.target.value);
            sliderVal.innerText = richterMagnitude.toFixed(1);
            richterVal.innerText = `${richterMagnitude.toFixed(1)} M_w`;
            if(earthquakeActive) updateSeismicPhysics(0);
        });

        btnTrigger.addEventListener('click', () => {
            earthquakeActive = !earthquakeActive;
            if (earthquakeActive) {
                btnTrigger.innerText = "Detener Sismo";
                btnTrigger.classList.replace('bg-yellow-600', 'bg-red-600');
                btnTrigger.classList.add('text-white');
            } else {
                btnTrigger.innerText = "Iniciar Onda Símica";
                btnTrigger.classList.replace('bg-red-600', 'bg-yellow-600');
                btnTrigger.classList.remove('text-white');
            }
        });

        btnReset.addEventListener('click', () => {
            earthquakeActive = false;
            earthquakeTime = 0;
            richterMagnitude = 1.0;
            slider.value = 1.0;
            sliderVal.innerText = "1.0";
            richterVal.innerText = "1.0 M_w";
            document.getElementById('disp-val').innerText = "0.00 m";
            document.getElementById('freq-val').innerText = "0.50 Hz";
            btnTrigger.innerText = "Iniciar Onda Símica";
            btnTrigger.className = "flex-1 bg-yellow-600 hover:bg-yellow-500 active:bg-yellow-700 text-gray-900 font-black py-3 px-4 rounded-xl transition duration-150 uppercase tracking-wider text-xs";
            updateStructuralStatus(0);
        });

        // Adaptación de pantalla móvil / Cambios de orientación
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Bucle de Renderizado de alta frecuencia (60fps / 120fps)
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            
            // Actualizar físicas analíticas
            updateSeismicPhysics(deltaTime);
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
