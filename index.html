<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Sísmico Realista - Colapso Parque Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 overflow-hidden w-screen h-screen font-sans select-none">

    <div class="absolute top-0 left-0 w-full h-full p-3 z-10 pointer-events-none flex flex-col justify-between">
        
        <div class="flex flex-col md:flex-row gap-3 w-full justify-between items-start">
            <div class="glass p-4 rounded-xl pointer-events-auto shadow-2xl w-full max-w-sm">
                <div class="flex justify-between items-center border-b border-slate-700 pb-1 mb-2">
                    <h1 class="text-sm font-black tracking-widest text-amber-500 uppercase">ANÁLISIS ESTRUCTURAL V70</h1>
                    <span id="geo-status" class="text-[10px] bg-slate-800 text-emerald-400 px-2 py-0.5 rounded font-mono font-bold">REPOSO</span>
                </div>
                <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs font-mono">
                    <span class="text-slate-400">Magnitud Momento:</span>
                    <span id="richter-val" class="text-right text-red-400 font-bold">1.0 Mw</span>
                    
                    <span class="text-slate-400">Resonancia Suelo:</span>
                    <span id="freq-val" class="text-right text-cyan-400">4.50 Hz</span>
                    
                    <span class="text-slate-400">Deflexión Cúspide:</span>
                    <span id="disp-val" class="text-right text-orange-400">0.00 m</span>
                    
                    <span class="text-slate-400">Integridad Estructural:</span>
                    <span id="stress-val" class="text-right text-green-400 font-bold">100% SANA</span>
                </div>
            </div>

            <div class="glass p-3 rounded-xl pointer-events-auto shadow-2xl w-full max-w-xs text-[11px]">
                <div class="text-slate-400 font-bold uppercase tracking-wider text-[10px] mb-1 text-amber-400">Estado de Fluencia Dinámica</div>
                <div id="comparison-box" class="space-y-1 font-mono"></div>
            </div>
        </div>

        <div class="glass p-4 rounded-2xl pointer-events-auto shadow-2xl w-full max-w-md mx-auto mb-2">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Fuerza del Sismo (Escala Richter)</span>
                <span id="slider-display" class="bg-red-600 text-white px-2.5 py-0.5 rounded-md font-black text-xs font-mono">1.0</span>
            </div>
            
            <input type="range" id="richter-slider" min="1.0" max="10.0" step="0.1" value="1.0" 
                   class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-red-500 mb-3">
            
            <div class="flex gap-2">
                <button id="btn-trigger" class="w-3/4 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-2.5 px-4 rounded-xl transition-all duration-150 text-xs uppercase tracking-wider shadow-lg shadow-amber-500/20">
                    Iniciar Sismo
                </button>
                <button id="btn-reset" class="w-1/4 bg-slate-800 hover:bg-slate-700 border border-slate-700 px-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-all text-slate-200">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <div id="canvas-container" class="w-full h-full absolute top-0 left-0 z-0"></div>

    <script>
        const structuralMatrix = [
            { max: 3.0, tipo: "Adobe / Mampostería", status: "Fluencia elástica superada en bases. Grietas críticas." },
            { max: 5.0, tipo: "Pórticos No Reforzados", status: "Falla por cortante en uniones viga-columna fijas." },
            { max: 7.0, tipo: "Diseño Urbano Común", status: "Flexión excesiva. Inicio de colapso en pisos intermedios." },
            { max: 8.5, tipo: "Torres Parque Central", status: "Núcleo rígido resiste, pero distorsiones extremas inician pancaking." },
            { max: 10.0, tipo: "Falla Tectónica Absoluta", status: "Destrucción total de nexos cinemáticos por aceleración severa." }
        ];

        const NUM_PISOS = 18;
        const ALTURA_TOTAL = 24.0; 
        const ALTO_PISO = ALTURA_TOTAL / NUM_PISOS;
        
        let sismoActivo = false;
        let tSismo = 0;
        let magRichter = 1.0;

        let estructura = [];
        let posSueloX = 0, posSueloZ = 0;

        // --- CONFIGURACIÓN THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050a);
        scene.fog = new THREE.FogExp2(0x05050a, 0.02);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(22, 16, 26);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2;

        scene.add(new THREE.AmbientLight(0x1e293b, 1.4));
        const dirLight = new THREE.DirectionalLight(0xfffbeb, 1.2);
        dirLight.position.set(30, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.8 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(100, 40, 0x334155, 0x1e293b);
        grid.position.y = 0.02;
        scene.add(grid);

        function createFacadeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#475569'; ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = '#0f172a';
            for (let y = 4; y < 128; y += 16) {
                for (let x = 4; x < 128; x += 12) {
                    ctx.fillRect(x, y, 8, 10);
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }
        const facadeTex = createFacadeTexture();

        const groupEstructural = new THREE.Group();
        scene.add(groupEstructural);

        const matVentanas = new THREE.MeshStandardMaterial({ map: facadeTex, roughness: 0.3 });
        const matConcreto = new THREE.MeshStandardMaterial({ color: 0x5a6a85, roughness: 0.6 });

        const geoNucleo = new THREE.BoxGeometry(4.2, ALTO_PISO, 4.2);
        const geoPantallaX = new THREE.BoxGeometry(0.5, ALTO_PISO, 4.4); 
        const geoPantallaZ = new THREE.BoxGeometry(4.4, ALTO_PISO, 0.5);

        for (let i = 0; i < NUM_PISOS; i++) {
            const pisoGroup = new THREE.Group();
            pisoGroup.position.y = (i * ALTO_PISO) + (ALTO_PISO / 2);

            pisoGroup.add(new THREE.Mesh(geoNucleo, matVentanas));
            const px1 = new THREE.Mesh(geoPantallaX, matConcreto); px1.position.x = 2.3; pisoGroup.add(px1);
            const px2 = new THREE.Mesh(geoPantallaX, matConcreto); px2.position.x = -2.3; pisoGroup.add(px2);
            const pz1 = new THREE.Mesh(geoPantallaZ, matConcreto); pz1.position.z = 2.3; pisoGroup.add(pz1);
            const pz2 = new THREE.Mesh(geoPantallaZ, matConcreto); pz2.position.z = -2.3; pisoGroup.add(pz2);

            pisoGroup.castShadow = true;
            groupEstructural.add(pisoGroup);

            estructura.push({
                mesh: pisoGroup,
                yOriginal: pisoGroup.position.y,
                x: 0, z: 0,
                vx: 0, vz: 0,
                temp_ax: 0, temp_az: 0,
                mass: 1.0 - (i * 0.02),
                broken: false,
                compression: 0,
                tiltX: 0, tiltZ: 0
            });
        }

        // --- MOTOR FÍSICO CON CÁLCULO DE CORTANTE Y COLAPSO ---
        function updatePhysicsMDOF(dt) {
            if (dt > 0.03) dt = 0.03; 
            if (dt <= 0) return;

            const SUB_STEPS = 8;
            const subDt = dt / SUB_STEPS;

            const kStiffness = 180.0; 
            const cDamping = 4.8;    

            for (let step = 0; step < SUB_STEPS; step++) {
                if (sismoActivo) {
                    tSismo += subDt;
                    const amplitudSuelo = Math.pow(1.9, magRichter) * 0.013;
                    const freqSuelo = Math.max(0.5, 4.6 - (magRichter * 0.38));
                    
                    posSueloX = Math.sin(tSismo * freqSuelo * Math.PI * 2) * amplitudSuelo;
                    posSueloZ = Math.cos(tSismo * freqSuelo * 1.15 * Math.PI * 2) * (amplitudSuelo * 0.5);
                } else {
                    posSueloX += (0 - posSueloX) * 0.1;
                    posSueloZ += (0 - posSueloZ) * 0.1;
                }

                // PASO 1: Capturar Fuerzas y evaluar distorsión local (Drift)
                for (let i = 0; i < NUM_PISOS; i++) {
                    let pCurr = estructura[i];
                    
                    let posInferiorX = (i === 0) ? posSueloX : estructura[i - 1].x;
                    let posInferiorZ = (i === 0) ? posSueloZ : estructura[i - 1].z;
                    let velInferiorX = (i === 0) ? 0 : estructura[i - 1].vx;
                    let velInferiorZ = (i === 0) ? 0 : estructura[i - 1].vz;

                    let posSuperiorX = (i === NUM_PISOS - 1) ? pCurr.x : estructura[i + 1].x;
                    let posSuperiorZ = (i === NUM_PISOS - 1) ? pCurr.z : estructura[i + 1].z;
                    let velSuperiorX = (i === NUM_PISOS - 1) ? 0 : estructura[i + 1].vx;
                    let velSuperiorZ = (i === NUM_PISOS - 1) ? 0 : estructura[i + 1].vz;

                    // Análisis de Distorsión entre plantas colindantes
                    let driftX = pCurr.x - posInferiorX;
                    let driftZ = pCurr.z - posInferiorZ;
                    let driftMag = Math.sqrt(driftX * driftX + driftZ * driftZ);

                    // Umbral crítico de fractura de concreto/acero
                    let limiteFluencia = 0.45; 
                    if (driftMag > limiteFluencia && !pCurr.broken) {
                        pCurr.broken = true;
                        // Guardar el vector unitario del corte para la dirección del desplome
                        pCurr.tiltX = driftX / (driftMag || 1);
                        pCurr.tiltZ = driftZ / (driftMag || 1);
                    }

                    // Degradación no lineal de rigidez estructural al quebrar
                    let kActual = pCurr.broken ? kStiffness * 0.06 : kStiffness;
                    let cActual = pCurr.broken ? cDamping * 0.25 : cDamping;

                    let fElasticX = -kActual * (pCurr.x - posInferiorX) + (i === NUM_PISOS - 1 ? 0 : kActual * (posSuperiorX - pCurr.x));
                    let fElasticZ = -kActual * (pCurr.z - posInferiorZ) + (i === NUM_PISOS - 1 ? 0 : kActual * (posSuperiorZ - pCurr.z));

                    let fDampingX = -cActual * (pCurr.vx - velInferiorX) + (i === NUM_PISOS - 1 ? 0 : cActual * (velSuperiorX - pCurr.vx));
                    let fDampingZ = -cActual * (pCurr.vz - velInferiorZ) + (i === NUM_PISOS - 1 ? 0 : cActual * (velSuperiorZ - pCurr.vz));

                    pCurr.temp_ax = (fElasticX + fDampingX) / pCurr.mass;
                    pCurr.temp_az = (fElasticZ + fDampingZ) / pCurr.mass;
                }

                // PASO 2: Integración Dinámica y reducción de altura (Pancaking)
                for (let i = 0; i < NUM_PISOS; i++) {
                    let pCurr = estructura[i];
                    
                    pCurr.vx += pCurr.temp_ax * subDt;
                    pCurr.vz += pCurr.temp_az * subDt;
                    pCurr.x += pCurr.vx * subDt;
                    pCurr.z += pCurr.vz * subDt;

                    // Si el entrepiso cedió, la gravedad lo aplasta progresivamente
                    if (pCurr.broken) {
                        pCurr.compression = Math.min(ALTO_PISO * 0.82, pCurr.compression + subDt * 0.75);
                    }

                    if (isNaN(pCurr.x) || Math.abs(pCurr.x) > 15) { pCurr.x = 0; pCurr.vx = 0; }
                    if (isNaN(pCurr.z) || Math.abs(pCurr.z) > 15) { pCurr.z = 0; pCurr.vz = 0; }
                }
            }

            // --- RECONSTRUCCIÓN GEOMÉTRICA DE LA TORRE Y TELEMETRÍA ---
            let maxDisp = 0;
            let brokenCount = 0;
            let currentY = 0;

            for (let i = 0; i < NUM_PISOS; i++) {
                let p = estructura[i];
                if (p.broken) brokenCount++;

                // Efecto Pancaking: la altura depende de la compresión acumulada de los pisos inferiores
                let altoEfectivo = ALTO_PISO - p.compression;
                currentY += altoEfectivo;
                
                p.mesh.position.y = currentY - (altoEfectivo / 2);
                p.mesh.position.x = p.x;
                p.mesh.position.z = p.z;
                
                // Rotación transitoria + Inclinación plástica permanente debida al colapso
                let rotZ_plastica = p.broken ? (p.tiltX * (p.compression / ALTO_PISO) * 0.45) : 0;
                let rotX_plastica = p.broken ? (-p.tiltZ * (p.compression / ALTO_PISO) * 0.45) : 0;

                p.mesh.rotation.z = p.vx * 0.025 + rotZ_plastica;
                p.mesh.rotation.x = -p.vz * 0.025 + rotX_plastica;

                if (i === NUM_PISOS - 1) {
                    maxDisp = Math.sqrt(Math.pow(p.x - posSueloX, 2) + Math.pow(p.z - posSueloZ, 2)) * 5.0;
                }
            }

            grid.position.x = posSueloX;
            grid.position.z = posSueloZ;

            // Actualización de UI
            if (isNaN(maxDisp)) maxDisp = 0;
            document.getElementById('disp-val').innerText = `${maxDisp.toFixed(2)} m`;
            
            if (sismoActivo) {
                const freqSuelo = Math.max(0.5, 4.6 - (magRichter * 0.38));
                document.getElementById('freq-val').innerText = `${freqSuelo.toFixed(2)} Hz`;
            }

            // Gestión del Estado de Integridad Global
            const stressEl = document.getElementById('stress-val');
            const geoStatus = document.getElementById('geo-status');

            if (brokenCount === 0) {
                stressEl.innerText = "100% SANA";
                stressEl.className = "text-right text-green-400 font-bold";
                if (sismoActivo) {
                    geoStatus.innerText = "TERREMOTO ACTIVO";
                    geoStatus.className = "text-[10px] bg-red-950 text-red-400 px-2 py-0.5 rounded font-mono font-bold animate-pulse";
                } else {
                    geoStatus.innerText = "REPOSO";
                    geoStatus.className = "text-[10px] bg-slate-800 text-emerald-400 px-2 py-0.5 rounded font-mono font-bold";
                }
            } else {
                let pctSano = Math.max(0, Math.round(((NUM_PISOS - brokenCount) / NUM_PISOS) * 100));
                stressEl.innerText = `${pctSano}% INTEGRAL`;
                
                if (pctSano > 70) {
                    stressEl.className = "text-right text-yellow-400 font-bold";
                    geoStatus.innerText = `DAÑO LOCALIZADO (${brokenCount} P.)`;
                    geoStatus.className = "text-[10px] bg-amber-950 text-amber-400 px-2 py-0.5 rounded font-mono font-bold animate-pulse";
                } else {
                    stressEl.className = "text-right text-red-500 font-black animate-pulse";
                    geoStatus.innerText = "COLAPSO PROGRESIVO";
                    geoStatus.className = "text-[10px] bg-red-700 text-white px-2 py-0.5 rounded font-mono font-bold animate-bounce";
                }
            }
        }

        // --- MANEJO DE INTERFAZ DE USUARIO ---
        function updateComparisonMatrix() {
            const containerBox = document.getElementById('comparison-box');
            let currentTarget = structuralMatrix[0];
            for (let target of structuralMatrix) {
                if (magRichter <= target.max) { currentTarget = target; break; }
                if (magRichter > 8.5) currentTarget = structuralMatrix[4];
            }
            containerBox.innerHTML = `
                <div class="bg-slate-900/60 p-2 rounded border border-slate-700/60">
                    <span class="text-red-400 font-bold">Límite Crítico:</span> <br>
                    <span class="text-white text-xs font-semibold">${currentTarget.tipo}</span>
                </div>
                <div class="text-slate-300 text-[10px] leading-relaxed mt-1">
                    <span class="text-amber-400 font-bold">Física:</span> ${currentTarget.status}
                </div>
            `;
        }

        const slider = document.getElementById('richter-slider');
        const sliderDisplay = document.getElementById('slider-display');
        const richterVal = document.getElementById('richter-val');
        const btnTrigger = document.getElementById('btn-trigger');
        const btnReset = document.getElementById('btn-reset');

        function onSliderChange(val) {
            magRichter = parseFloat(val);
            sliderDisplay.innerText = magRichter.toFixed(1);
            richterVal.innerText = `${magRichter.toFixed(1)} Mw`;
            updateComparisonMatrix();
        }

        slider.addEventListener('input', (e) => onSliderChange(e.target.value));

        btnTrigger.addEventListener('click', () => {
            sismoActivo = !sismoActivo;
            if (sismoActivo) {
                btnTrigger.innerText = "Detener Sismo";
                btnTrigger.className = "w-3/4 bg-red-600 hover:bg-red-500 text-white font-black py-2.5 px-4 rounded-xl transition-all text-xs uppercase tracking-wider shadow-lg shadow-red-500/20 pointer-events-auto";
            } else {
                btnTrigger.innerText = "Iniciar Sismo";
                btnTrigger.className = "w-3/4 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-2.5 px-4 rounded-xl transition-all text-xs uppercase tracking-wider shadow-lg shadow-amber-500/20 pointer-events-auto";
            }
        });

        btnReset.addEventListener('click', () => {
            sismoActivo = false;
            tSismo = 0;
            posSueloX = 0; posSueloZ = 0;
            slider.value = 1.0;
            onSliderChange(1.0);
            
            btnTrigger.innerText = "Iniciar Sismo";
            btnTrigger.className = "w-3/4 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-2.5 px-4 rounded-xl transition-all text-xs uppercase tracking-wider pointer-events-auto";

            estructura.forEach((p, i) => {
                p.x = 0; p.z = 0; p.vx = 0; p.vz = 0; p.temp_ax = 0; p.temp_az = 0;
                p.broken = false;
                p.compression = 0;
                p.tiltX = 0; p.tiltZ = 0;
                p.mesh.position.set(0, (i * ALTO_PISO) + (ALTO_PISO / 2), 0);
                p.mesh.rotation.set(0, 0, 0);
            });
            grid.position.set(0, 0.02, 0);
            
            document.getElementById('disp-val').innerText = "0.00 m";
            document.getElementById('freq-val').innerText = "4.50 Hz";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateComparisonMatrix();

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            updatePhysicsMDOF(clock.getDelta());
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
